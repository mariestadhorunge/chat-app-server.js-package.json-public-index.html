<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>serverchat</title>
  <style>
    body {
      font-family: Arial;
      background: #333; /* mörk bakgrund på sidan */
      color: #eee;
      margin: 0;
      padding: 20px;
    }

    #login {
      max-width: 400px;
      margin: 220px auto;
      text-align: center;
    }

    #login input, #login button {
      padding: 10px;
      font-size: 16px;
      margin: 2px;
    }

    #container {
      display: flex;
      max-width: 800px;
      margin: 20px auto;
      display: none;
    }

    #userList {
      width: 200px;
      border:1px solid #ccc;
      padding:10px;
      background:#fff;
      color:#000;
    }

    #userList h3 {
      margin-top: 0;
    }

    #userList ul {
      list-style:none;
      padding-left:0;
    }

    #chat {
      flex:1;
      margin-left:20px;
      display:flex;
      flex-direction:column;
    }

    #messages {
      list-style:none;
      padding:10px;
      height:300px;
      overflow-y:scroll;
      border:1px solid #ccc;
      background:#fff;
      color:#000;
      margin-bottom:10px;
    }

    #inputContainer {
      display: flex;
      margin-top: 5px;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px 0 0 4px;
    }

    #sendBtn {
      padding: 10px 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-left: none;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      background-color: #eee;
    }
	
	/* NY KOD START */
.ping {
  background-color: yellow;
  color: black;
  font-weight: bold;
  padding: 2px 4px;
  border-radius: 3px;
}
/* NY KOD SLUT */


  </style>
</head>

<script src="http://localhost:35729/livereload.js"></script>

<body>

<div id="login">
  <h2>!</h2>
  <input type="text" id="usernameInput" placeholder="Ange ditt namn" />
  <br>
  <input type="password" id="passwordInput" placeholder="Lösenord" style="display:none;" />
  <br>
  <button id="enterChatBtn">Gå med i chatten</button>
</div>

<div id="container">
  <div id="userList">
    <h4>Användare</h4>
    <ul id="users"></ul>
  </div>
  <div id="chat">
    <ul id="messages"></ul>
	<div id="typingStatus" style="font-style: italic; color: yellow; height: 20px;"></div>
    <div id="inputContainer">
      <input id="messageInput" autocomplete="off" placeholder="Skriv meddelande..." />
      <button id="sendBtn">Skicka</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";

const ADMIN_NAME = "Admin";
const ADMIN_PASSWORD = "1";

const MOD_NAME = "Mod";
const MOD_PASSWORD = "1";

const loginDiv = document.getElementById("login");
const containerDiv = document.getElementById("container");
const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");
const enterChatBtn = document.getElementById("enterChatBtn");



const messages = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const usersUl = document.getElementById("users");

// ─────────── TYPING STATUS ───────────
const typingStatus = document.getElementById("typingStatus");
let typingTimeout; // ← declare timeout variable

// Send typing event when user types
messageInput.addEventListener("input", () => {
  const isTyping = messageInput.value.length > 0;
  socket.emit("typing", isTyping);
  
  // Clear previous timeout
  clearTimeout(typingTimeout);
  
    // After 2 seconds of inactivity, emit "stopped typing"
  typingTimeout = setTimeout(() => {
    socket.emit("typing", false);
  }, 2000);
  
});

// Receive typing events from others
socket.on("typing", ({ username: typingUser, isTyping }) => {
  if (isTyping) {
    typingStatus.textContent = `${typingUser} skriver...`;
  } else {
    typingStatus.textContent = "";
  }
});





// ─────────── PASTE IMAGE SUPPORT ───────────
// NY KOD START: Paste images into chat
document.addEventListener("paste", (e) => {
  const items = e.clipboardData?.items;
  if(!items) return;

  for (const item of items) {
    if (item.type.indexOf("image") === 0) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        const dataURL = reader.result;
        socket.emit("chat image", dataURL);
      };
      reader.readAsDataURL(file);
    }
  }
});
socket.on("chat image", (imgObj) => {
  const li = document.createElement("li");

  // Add username
  const nameSpan = document.createElement("span");
  nameSpan.textContent = imgObj.name + ": ";
  if(imgObj.isAdmin) nameSpan.style.color = "#FF8C00";
  if(imgObj.isMod) nameSpan.style.color = "#355872";
  li.appendChild(nameSpan);

  // Add image
  const img = document.createElement("img");
  img.src = imgObj.data;
  img.style.maxWidth = "200px";
  img.style.maxHeight = "200px";
  img.style.display = "block";
  img.style.marginTop = "5px";
  img.style.cursor = "pointer"; // ← NY KOD

  // ───── NY KOD START: Click to open full image ─────
img.onclick = () => {
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100vw";
  overlay.style.height = "100vh";
  overlay.style.background = "rgba(0,0,0,0.8)";
  overlay.style.display = "flex";
  overlay.style.alignItems = "center";
  overlay.style.justifyContent = "center";
  overlay.style.zIndex = "9999";

  const fullImg = document.createElement("img");
  fullImg.src = imgObj.data;
  fullImg.style.maxWidth = "90%";
  fullImg.style.maxHeight = "90%";
  fullImg.style.boxShadow = "0 0 20px black";

  overlay.appendChild(fullImg);

  overlay.onclick = () => overlay.remove(); // click anywhere to close
  document.body.appendChild(overlay);
};
// ───── NY KOD SLUT ─────

  li.appendChild(img);

  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});
// NY KOD SLUT
//

// Visa lösenordsfält beroende på namn
usernameInput.addEventListener("input", () => {
  const name = usernameInput.value.trim();
  if(name === ADMIN_NAME || name === MOD_NAME){
    passwordInput.style.display = "inline-block";
  } else {
    passwordInput.style.display = "none";
  }
});

// Gå med i chatten
enterChatBtn.onclick = () => {
  const name = usernameInput.value.trim();
  const password = passwordInput.value;

  if(name === ADMIN_NAME && password !== ADMIN_PASSWORD){
    alert("Fel lösenord för Admin!");
    return;
  }
  if(name === MOD_NAME && password !== MOD_PASSWORD){
    alert("Fel lösenord för Mod!");
    return;
  }

  if(name){
    username = name;
    loginDiv.style.display = "none";
    containerDiv.style.display = "flex";
    socket.emit("join", username, password);
  }
};
// Press Enter to login
usernameInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") enterChatBtn.click();
});

passwordInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") enterChatBtn.click();
});

// Ta emot meddelanden
socket.on("chat message", (msgObj) => {
  const li = document.createElement("li");
  const name = msgObj.name;
  const text = msgObj.text;
  const isAdmin = msgObj.isAdmin;
  const isMod = msgObj.isMod;
  
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  li.textContent = `[${time}] `;
  // NY KOD START
// Kolla om meddelandet innehåller @username och markera det
const messageText = text.replace(/@(\w+)/g, (match, p1) => {
  if(p1 === username){ // om pingad användare är du
    return `<span class="ping">@${p1}</span>`;
  }
  return match;
});






  const nameSpan = document.createElement("span");

  if(isAdmin){
    const img = document.createElement("img");
    img.src = "/AdminIcon.png";
    img.style.width = "16px";
    img.style.height = "16px";
    img.style.verticalAlign = "middle";
    img.style.marginRight = "4px";
    li.appendChild(img);
    nameSpan.style.color = "#FF8C00";
    nameSpan.style.fontWeight = "bold";
  } else if(isMod){
    const img = document.createElement("img");
    img.src = "/ModIcon.png";
    img.style.width = "16px";
    img.style.height = "16px";
    img.style.verticalAlign = "middle";
    img.style.marginRight = "4px";
    li.appendChild(img);
    nameSpan.style.color = "#355872";
    nameSpan.style.fontWeight = "bold";
  }

  nameSpan.textContent = name + ":";
  li.appendChild(nameSpan);
  // li.appendChild(document.createTextNode(text));
  
  
  
  // Skapa ett span-element med innerHTML för att visa pings
const textNode = document.createElement("span");
textNode.innerHTML = messageText;
  // NY KOD START: Gör kick-meddelande rött
  if(isAdmin && text.includes("har kickat")) {
    textNode.style.color = "red";
    textNode.style.fontWeight = "bold";
  }
  // NY KOD SLUT
li.appendChild(textNode);

// NY KOD SLUT
  
  
  

  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});

// Skicka meddelande
sendBtn.onclick = () => {
  const msg = messageInput.value.trim();
  if(!msg) return;

  // ───── PM SUPPORT ─────
  if (msg.startsWith("/pm ")) {
    const parts = msg.split(" ");
    const target = parts[1];
    const text = parts.slice(2).join(" ");

    if (target && text) {
      socket.emit("private message", { target, text });
    }
  } else {
    socket.emit("chat message", msg);
  }

  messageInput.value = "";
};
messageInput.addEventListener("keypress", e => {
  if(e.key === "Enter") sendBtn.click();
});
// ───── PRIVATE MESSAGE RECEIVE ─────
socket.on("private message", ({ from, text }) => {
  const li = document.createElement("li");
  li.style.color = "purple";           // color for PMs
  li.style.fontStyle = "italic";
  li.textContent = `(PM från ${from}): ${text}`;
  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});

// Uppdatera användarlista
socket.on("updateUsers", (users) => {
  usersUl.innerHTML = "";
  users.forEach(u => {
    const li = document.createElement("li");
		//Admin
    if(u.isAdmin){
      const img = document.createElement("img");
      img.src = "/AdminIcon.png";
      img.style.width = "16px";
      img.style.height = "16px";
      img.style.verticalAlign = "middle";
      img.style.marginRight = "4px";
      li.appendChild(img);
      li.classList.add("me");
	  li.style.color = "#FF8C00";  //färg i användar listan
	  li.style.fontWeight = "bold";

	  //MODERATOR
    } else if(u.isMod){
      const img = document.createElement("img");
      img.src = "/ModIcon.png";
      img.style.width = "16px";
      img.style.height = "16px";
      img.style.verticalAlign = "middle";
      img.style.marginRight = "4px";
      li.appendChild(img);
      li.classList.add("mod");
	  li.style.color = "#355872"; //färg i användar listan
	  li.style.fontWeight = "bold";
    }

    const nameText = document.createTextNode(u.name);
    li.appendChild(nameText);
	    // NY KOD START: Kick-knapp för Admin
    if(username === "Admin" && !u.isAdmin){ // Admin kan kicka alla utom sig själv
      const kickBtn = document.createElement("button");
      kickBtn.textContent = "Kicka";
      kickBtn.style.marginLeft = "8px";
      kickBtn.style.cursor = "pointer";
      kickBtn.onclick = () => {
        socket.emit("kick", u.name);
      };
      li.appendChild(kickBtn);
    }
    // NY KOD SLUT
	

    usersUl.appendChild(li);
	
  });
      // ────────────── HÄR ska kick-lyssnaren ligga ──────────────
    // NY KOD START: Lyssna på kick EN GÅNG
    socket.on("kicked", (msg) => {
      alert(msg);
      window.location.reload(); // koppla bort användaren visuellt
    });
    // NY KOD SLUT
});
</script>

</body>
</html>
